# Scaled hosted training run on Prime Intellect's platform.
# Model: Qwen3-14B, multi-node with dedicated trainer + inference pools.
#
# Prerequisites:
#   - Prime API key with rft:write scope:  prime login
#   - perf-optimize environment pushed to the Hub or available in the run image
#   - Training image has bwrap + perf + gcc available
#   - kernel.perf_event_paranoid <= 1 on worker nodes running the environment
#
# Usage (submitted through Prime Intellect's hosted training dashboard or CLI;
# this same TOML also works as a multi-node SLURM job):
#   uv run rl @ ../configs/prime-rl/perf-optimize-hosted.toml
#
# For a SLURM launch, add a [slurm] section or layer a slurm_*.toml overlay.

output_dir = "outputs/perf-optimize-hosted"
max_steps = 1000
seq_len = 8192

[model]
name = "Qwen/Qwen3-14B"

[weight_broadcast]
type = "nccl"

[deployment]
type = "multi_node"
num_train_nodes = 1
num_infer_nodes = 1
gpus_per_node = 8

[wandb]
project = "perf-optimize"
name = "perf-optimize-hosted-14b"

[orchestrator.prime_monitor]
run_name = "perf-optimize-hosted-14b"

[ckpt]
interval = 100

[trainer.model]
impl = "custom"
attn = "flash_attention_3"

[trainer.model.compile]

[trainer.model.ac]
freq = 1

[trainer.optim]
type = "adamw"
lr = 1e-6
weight_decay = 0.01

[orchestrator]
batch_size = 512
rollouts_per_example = 16
oversampling_factor = 2.0
max_off_policy_steps = 4

[orchestrator.sampling]
max_tokens = 4096

[orchestrator.buffer]
online_difficulty_filtering = true
easy_threshold = 1.0
hard_threshold = 0.0
seed = 42

[[orchestrator.env]]
id = "perf-optimize"
name = "perf-optimize"
args = { language = "c", max_turns = 5 }

[orchestrator.eval]
interval = 50

[[orchestrator.eval.env]]
id = "perf-optimize"
name = "perf-optimize-eval"
args = { language = "c", max_turns = 5 }

[inference.parallel]
tp = 4
dp = 2
