# Disaggregated two-rig run: trainer + orchestrator on rig A, vLLM on rig B.
# Weight broadcast via shared NAS at /mnt/nas — both machines must have the
# same absolute mount path. Orchestrator sends rollout requests to the vLLM
# server over the LAN.
#
# Prerequisites:
#   - /mnt/nas mounted on BOTH rigs at the same path
#   - perf-optimize env installed in prime-rl's venv on BOTH rigs
#   - 20 Gbps LAN between them (weight broadcast + rollout generation traffic)
#
# Usage:
#   # Rig B (inference) — adjust --host if you firewall binds
#   cd prime-rl
#   uv run inference @ ../configs/prime-rl/perf-optimize-disagg-inference.toml \
#     --api-key $VLLM_API_KEY
#
#   # Rig A (trainer + orchestrator)
#   cd prime-rl
#   VLLM_API_KEY=<shared-secret> \
#   uv run rl @ ../configs/prime-rl/perf-optimize-disagg.toml \
#     --orchestrator.client.base-url http://<rig-b-ip>:8000/v1

output_dir = "/mnt/nas/runs/perf-optimize-disagg"
max_steps = 100
seq_len = 12288

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "perf-optimize"
name = "perf-optimize-disagg-4b"

[ckpt]
interval = 25

[trainer.model]
impl = "auto"
fused_lm_head_token_chunk_size = "auto"

[trainer.model.ac]
freq = 1

[trainer.model.lora]
rank = 32
alpha = 64
dropout = 0.0
target_modules = [
    "q_proj",
    "k_proj",
    "v_proj",
    "o_proj",
    "gate_proj",
    "up_proj",
    "down_proj",
]

[trainer.optim]
lr = 1e-5
weight_decay = 0.0

[orchestrator]
batch_size = 16
rollouts_per_example = 4

[orchestrator.sampling]
max_tokens = 2048

[[orchestrator.env]]
id = "perf-optimize"
name = "perf-optimize"
args = { language = "c", max_turns = 5, problems = ["matmul"] }
